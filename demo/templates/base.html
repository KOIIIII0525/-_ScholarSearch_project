<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScholarSearch - 学术论文搜索引擎{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">📚</span>
                <span class="brand-text">ScholarSearch</span>
            </a>
            <div class="nav-search">
                {% block nav_search %}{% endblock %}
            </div>
        </div>
    </nav>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>ScholarSearch - 学术论文垂直搜索引擎 | Information Storage and Retrieval 课程项目</p>
            <p class="footer-tech">技术栈: Python Flask + Whoosh | 核心算法: BM25, TF-IDF, PageRank, 语义搜索</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
